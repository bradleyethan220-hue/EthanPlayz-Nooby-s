<!DOCTYPE html>
<html>
<head>
  <title>Ethan Fan Website</title>
  <style>
    body {
      background: #1c1c1c;
      font-family: Arial, sans-serif;
      margin: 0;
      color: white;
    }

    /* Centered Login Box */
    #loginBox {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #2a2a2a;
      padding: 30px;
      width: 350px;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #3d3d3d;
      border-radius: 4px;
      background: #1f1f1f;
      color: white;
      font-size: 15px;
    }

    .input:focus {
      outline: none;
      border-color: #00a2ff;
    }

    .button {
      width: 100%;
      padding: 12px;
      background: #00a2ff;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 17px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    .button:hover {
      background: #0088d1;
    }

    /* Content Section */
    #content {
      display: none;
      padding: 20px;
      text-align: center;
    }

    .video-box {
      margin-bottom: 40px;
    }

    img.thumbnail {
      width: 300px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    img.icon {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 20px;
      border: 3px solid #00a2ff;
    }
  </style>
</head>

<body>

  <!-- LOGIN PAGE -->
  <div id="loginBox">
    <div class="login-box">
      <h2>Login</h2>

      <input id="displayName" class="input" placeholder="Display Name">
      <input id="password" class="input" type="password" placeholder="Password">

      <button class="button" onclick="login()">Log In</button>
    </div>
  </div>

  <!-- MAIN CONTENT AFTER LOGIN -->
  <div id="content">

    <!-- Your Icon -->
    <img class="icon" src="https://yt3.googleusercontent.com/y1eCSSYk1Bfwhz1fgdo_50VMsSCJQDso30IdHo3gcM6BFrzMfZ2PCIgC3R-Z1yoABt8GKTfEbw=s160-c-k-c0x00ffffff-no-rj">

    <h1>Welcome to Ethan's Fan Website</h1>
    <h2>Latest Videos</h2>

    <!-- VIDEO 1 -->
    <div class="video-box">
      <img class="thumbnail" src="https://i.ytimg.com/an_webp/lzlmpB5FggQ/mqdefault_6s.webp?du=3000&sqp=CNiFrc0G&rs=AOn4CLDwPy_pK61CB1qMlZbndxyMN8whSQ">

      <iframe width="560" height="315"
        src="https://www.youtube.com/embed/lzlmpB5FggQ?start=870"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

  </div>

  <script>
    function login() {
      const name = document.getElementById("displayName").value;

      if (name.trim() === "") {
        alert("Please enter a display name.");
        return;
      }

      // Hide login, show content
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("content").style.display = "block";
    }
  </script>

</body>
</html>
